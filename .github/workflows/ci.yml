name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: vecadvisor
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d vecadvisor"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12

    env:
      VECADVISOR_TEST_DSN: postgresql://postgres:postgres@localhost:5432/vecadvisor

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package and development dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Lint
        run: python -m ruff check .

      - name: Type check
        run: python -m mypy src/vecadvisor

      - name: Test
        run: python -m pytest

      - name: Build package
        run: python -m build
